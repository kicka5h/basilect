name: Wiki sync

# Mirrors the wiki/ directory in this repo to the GitHub wiki
# whenever docs are updated on main.

on:
  push:
    branches: [main]
    paths:
      - "wiki/**"

jobs:
  sync:
    name: Sync wiki/
    runs-on: ubuntu-latest

    steps:
      - name: Check for App credentials
        id: check
        env:
          APP_ID: ${{ secrets.APP_ID }}
        run: |
          if [ -z "$APP_ID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::APP_ID secret is not set — skipping wiki sync."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate App token
        if: steps.check.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout source repo
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Checkout wiki repo
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki-repo
          token: ${{ steps.app-token.outputs.token }}

      - name: Copy docs to wiki repo
        if: steps.check.outputs.skip != 'true'
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            wiki/ wiki-repo/

      - name: Commit and push
        if: steps.check.outputs.skip != 'true'
        working-directory: wiki-repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "docs: sync wiki from ${{ github.sha }}"
            git push
          fi
